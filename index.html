<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raayesh Jewellers | Premium Silver</title>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
            --white: #ffffff;
            --gray: #a0a0a0;
        }

        body {
            margin: 0;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            margin-left: 20px;
            transition: 0.3s;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        nav a:hover {
            color: var(--gold);
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1611085583191-a3b1a1130641?q=80&w=2070&auto=format&fit=crop') center/cover;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: var(--white);
        }

        .hero p {
            color: var(--gold);
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Gallery Section */
        .gallery {
            padding: 80px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            color: var(--gold);
            margin-bottom: 50px;
            font-size: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            border: 1px solid #222;
            padding: 10px;
            transition: 0.4s;
            text-align: center;
        }

        .card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            filter: grayscale(20%);
        }

        .card h3 {
            margin-top: 15px;
            font-weight: 400;
        }

        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid #222;
            color: var(--gray);
            font-size: 0.8rem;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: var(--gold);
            color: black;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: white;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Raayesh Jewellers</div>
        <div>
            <a href="index.html">Home</a>
            <a href="contact.html">Contact Us</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Exquisite Silver Artistry</h1>
        <p>Tradition meets Modern Elegance</p>
        <a href="#collection" class="btn">View Gallery</a>
    </section>

    <section class="gallery" id="collection">
        <h2 class="section-title">Our Featured Designs</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1515562141207-7a18b5ce7142?q=80&w=2070&auto=format&fit=crop" alt="Silver Chain">
                <h3>Handcrafted Neckchains</h3>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=2070&auto=format&fit=crop" alt="Silver Bracelet">
                <h3>Signature Bracelets</h3>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?q=80&w=2070&auto=format&fit=crop" alt="Silver Ornament">
                <h3>Custom Creations</h3>
            </div>
        </div>
    </section>

    <footer>
        © 2026 Raayesh Jewellers. Built with excellence.
    </footer>

</body>
</html>
