<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raayesh Jewellers | Premium Silver</title>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
            --white: #ffffff;
            --gray: #a0a0a0;
            --drawer-bg: #111111;
        }

        body {
            margin: 0;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Hamburger Icon */
        .menu-btn {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 25px;
            height: 18px;
            z-index: 1100;
        }

        .menu-btn span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: var(--gold);
            transition: 0.3s;
        }

        /* Drawer Box */
        .drawer {
            position: fixed;
            top: 0;
            right: -300px; /* Hidden by default */
            width: 300px;
            height: 100%;
            background-color: var(--drawer-bg);
            z-index: 1050;
            transition: 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
            padding-top: 100px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        .drawer.active {
            right: 0;
        }

        .drawer a {
            color: var(--white);
            text-decoration: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            border-bottom: 1px solid #222;
        }

        .drawer a:hover {
            color: var(--gold);
            padding-left: 50px;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 1040;
        }

        .overlay.active {
            display: block;
        }

        /* Hero Section */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1611085583191-a3b1a1130641?q=80&w=2070&auto=format&fit=crop') center/cover;
            padding: 0 20px;
        }

        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; color: var(--white); }
        .hero p { color: var(--gold); font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; }

        /* Gallery */
        .gallery { padding: 80px 5%; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; color: var(--gold); margin-bottom: 50px; font-size: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { border: 1px solid #222; padding: 10px; transition: 0.4s; text-align: center; }
        .card img { width: 100%; height: 350px; object-fit: cover; filter: grayscale(20%); }
        .card h3 { margin-top: 15px; font-weight: 400; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 30px; background-color: var(--gold); color: black; text-decoration: none; font-weight: bold; text-transform: uppercase; }

        footer { text-align: center; padding: 40px; border-top: 1px solid #222; color: var(--gray); font-size: 0.8rem; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Raayesh Jewellers</div>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="drawer" id="drawer">
        <a href="index.html" onclick="toggleMenu()">Home</a>
        <a href="contact.html" onclick="toggleMenu()">Contact Us</a>
    </div>

    <section class="hero">
        <h1>Exquisite Silver Artistry</h1>
        <p>Tradition meets Modern Elegance</p>
        <a href="#collection" class="btn">View Gallery</a>
    </section>

    <section class="gallery" id="collection">
        <h2 class="section-title">Our Featured Designs</h2>
        <div class="grid">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1515562141207-7a18b5ce7142?q=80&w=2070&auto=format&fit=crop" alt="Silver Chain">
                <h3>Handcrafted Neckchains</h3>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=2070&auto=format&fit=crop" alt="Silver Bracelet">
                <h3>Signature Bracelets</h3>
            </div>
            <div class="card">
                <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?q=80&w=2070&auto=format&fit=crop" alt="Silver Ornament">
                <h3>Custom Creations</h3>
            </div>
        </div>
    </section>

    <footer>
        © 2026 Raayesh Jewellers. Built with excellence.
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('drawer').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
