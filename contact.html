<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Raayesh Jewellers</title>
    <style>
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
            --white: #ffffff;
            --gray: #a0a0a0;
            --drawer-bg: #111111;
        }

        body {
            margin: 0;
            background-color: var(--black);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid #222;
            background: var(--black);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-link {
            text-decoration: none;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .logo-link:hover .logo {
            color: var(--white);
        }

        /* Hamburger Icon */
        .menu-btn {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 25px;
            height: 18px;
            z-index: 1100;
        }

        .menu-btn span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: var(--gold);
            transition: 0.3s;
        }

        /* Drawer Box */
        .drawer {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background-color: var(--drawer-bg);
            z-index: 1050;
            transition: 0.4s ease-in-out;
            display: flex;
            flex-direction: column;
            padding-top: 100px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            text-align: left;
        }

        .drawer.active {
            right: 0;
        }

        .drawer a {
            color: var(--white);
            text-decoration: none;
            padding: 20px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #222;
        }

        .drawer a:hover {
            color: var(--gold);
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 1040;
        }

        .overlay.active {
            display: block;
        }

        /* Contact Content */
        .contact-container {
            padding: 100px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .info-box {
            border: 1px solid var(--gold);
            padding: 40px;
            background-color: #111;
            margin-top: 30px;
        }

        .map-link {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 40px;
            background-color: var(--white);
            color: var(--black);
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: 0.3s;
        }

        .map-link:hover {
            background-color: var(--gold);
        }

        footer {
            margin-top: 100px;
            padding: 40px;
            border-top: 1px solid #222;
            color: var(--gray);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-link">
            <div class="logo">Raayesh Jewellers</div>
        </a>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="drawer" id="drawer">
        <a href="index.html" onclick="toggleMenu()">Home</a>
        <a href="contact.html" onclick="toggleMenu()">Contact Us</a>
    </div>

    <div class="contact-container">
        <h1>Visit Us</h1>
        <p>Experience the weight and shine of our silver in person.</p>
        
        <div class="info-box">
            <h2 style="color: var(--gold); margin-top: 0;">Location</h2>
            <p style="margin-bottom: 20px;">Raayesh Jewellers<br>Jeweler's Lane, Car Street, Mangaluru, Karnataka 575001</p>
            
            <a href="https://maps.app.goo.gl/Tc1v8aeW1S8nGsRUA" class="map-link" target="_blank">📍 OPEN IN GOOGLE MAPS</a>
        </div>
    </div>

    <footer>
        © 2026 Raayesh Jewellers. All Rights Reserved.
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('drawer').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
    </script>
</body>
</html>
